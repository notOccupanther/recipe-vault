<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Niall's Recipe Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #faf7f2;
      --bg-card:   #ffffff;
      --bg-header: #1c1510;
      --text:      #1c1510;
      --text-mid:  #4a3f35;
      --text-dim:  #8a7d72;
      --amber:     #c8762a;
      --amber-lt:  #f0a848;
      --amber-bg:  #fef3e2;
      --border:    #e8e0d4;
      --shadow:    0 2px 12px rgba(28,21,16,0.08);
      --shadow-hover: 0 8px 32px rgba(28,21,16,0.14);
      --radius:    12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--bg-header);
      padding: 2rem 1.5rem 1.75rem;
      text-align: center;
    }

    .header-eyebrow {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--amber-lt);
      margin-bottom: 0.6rem;
    }

    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 900;
      color: #faf7f2;
      line-height: 1.1;
    }

    .header-title span { color: var(--amber-lt); }

    .header-sub {
      font-size: 0.85rem;
      color: #9c8f82;
      margin-top: 0.6rem;
    }

    /* ── Controls ── */
    .controls {
      max-width: 1100px;
      margin: 1.5rem auto 0;
      padding: 0 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .count-label {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-right: auto;
    }

    .filter-btn {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.35rem 0.85rem;
      border-radius: 100px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-mid);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.03em;
    }

    .filter-btn.active, .filter-btn:hover {
      background: var(--amber);
      border-color: var(--amber);
      color: #fff;
    }

    .search-wrap {
      position: relative;
    }

    .search-input {
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      padding: 0.38rem 0.85rem 0.38rem 2rem;
      border: 1.5px solid var(--border);
      border-radius: 100px;
      background: #fff;
      color: var(--text);
      outline: none;
      width: 180px;
      transition: border-color 0.15s;
    }

    .search-input:focus { border-color: var(--amber); }

    .search-icon {
      position: absolute;
      left: 0.65rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.8rem;
      color: var(--text-dim);
      pointer-events: none;
    }

    /* ── Grid ── */
    .grid {
      max-width: 1100px;
      margin: 1.5rem auto 3rem;
      padding: 0 1.25rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    /* ── Card ── */
    .card {
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: var(--border);
      display: block;
    }

    .card-thumb-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      background: linear-gradient(135deg, #f0e8d8 0%, #e8d8c0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    .card-body {
      padding: 1rem 1.1rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex: 1;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .platform-badge {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.18rem 0.55rem;
      border-radius: 100px;
      background: var(--amber-bg);
      color: var(--amber);
    }

    .card-date {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-left: auto;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
    }

    .card-notes {
      font-size: 0.78rem;
      color: var(--text-mid);
      line-height: 1.55;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: auto;
      padding-top: 0.5rem;
    }

    .tag {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 0.15rem 0.5rem;
      border-radius: 100px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    /* ── Empty state ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-dim);
    }

    .empty-icon { font-size: 3rem; margin-bottom: 1rem; }

    .empty h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--text-mid);
      margin-bottom: 0.5rem;
    }

    .empty p { font-size: 0.85rem; line-height: 1.6; max-width: 380px; margin: 0 auto; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.75rem;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 540px) {
      .grid { grid-template-columns: 1fr; }
      .search-input { width: 140px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-eyebrow">Personal Collection</div>
    <h1 class="header-title">Recipe<span>.</span> Vault</h1>
    <p class="header-sub">Every recipe worth making, in one place.</p>
  </header>

  <div class="controls">
    <span class="count-label" id="countLabel">Loading&hellip;</span>
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input class="search-input" type="text" id="searchInput" placeholder="Search recipes&hellip;" />
    </div>
    <div id="tagFilters"></div>
  </div>

  <div class="grid" id="grid">
    <div class="empty">
      <div class="empty-icon">&#127859;</div>
      <h2>Nothing here yet</h2>
      <p>Send a recipe link in Telegram and it&rsquo;ll appear here automatically.</p>
    </div>
  </div>

  <footer>
    Recipe Vault &mdash; updated automatically via Telegram &middot; <a href="#" style="color:var(--amber);text-decoration:none" onclick="location.reload();return false;">Refresh</a>
  </footer>

  <script>
    const PLATFORM_LABELS = {
      youtube: 'YouTube',
      tiktok: 'TikTok',
      instagram: 'Instagram',
      twitter: 'X / Twitter',
      reddit: 'Reddit',
      web: 'Web'
    };

    const PLATFORM_EMOJI = {
      youtube: '&#9654;',
      tiktok: '&#127926;',
      instagram: '&#128247;',
      twitter: '&#128038;',
      reddit: '&#129302;',
      web: '&#127760;'
    };

    let allRecipes = [];
    let activeTag = null;

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function renderGrid(recipes) {
      const grid = document.getElementById('grid');
      const count = document.getElementById('countLabel');

      if (!recipes.length) {
        count.textContent = 'No recipes found';
        grid.innerHTML = '<div class="empty"><div class="empty-icon">&#127859;</div><h2>Nothing here yet</h2><p>Send a recipe link in Telegram and it\u2019ll appear here automatically.</p></div>';
        return;
      }

      count.textContent = recipes.length + ' recipe' + (recipes.length !== 1 ? 's' : '');

      grid.innerHTML = recipes.map(function(r) {
        var thumb = r.thumbnail
          ? '<img class="card-thumb" src="' + r.thumbnail + '" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'" /><div class="card-thumb-placeholder" style="display:none">' + (PLATFORM_EMOJI[r.platform] || '&#127859;') + '</div>'
          : '<div class="card-thumb-placeholder">' + (PLATFORM_EMOJI[r.platform] || '&#127859;') + '</div>';

        var tags = (r.tags || []).map(function(t) {
          return '<span class="tag">' + t + '</span>';
        }).join('');

        var notes = r.notes ? '<p class="card-notes">' + r.notes + '</p>' : '';
        var badge = '<span class="platform-badge">' + (PLATFORM_LABELS[r.platform] || r.platform || 'Web') + '</span>';
        var date = '<span class="card-date">' + formatDate(r.added) + '</span>';

        return '<a class="card" href="' + r.url + '" target="_blank" rel="noopener">' +
          thumb +
          '<div class="card-body">' +
            '<div class="card-meta">' + badge + date + '</div>' +
            '<div class="card-title">' + r.name + '</div>' +
            notes +
            (tags ? '<div class="card-tags">' + tags + '</div>' : '') +
          '</div>' +
        '</a>';
      }).join('');
    }

    function buildTagFilters(recipes) {
      var tagSet = {};
      recipes.forEach(function(r) {
        (r.tags || []).forEach(function(t) { tagSet[t] = (tagSet[t] || 0) + 1; });
      });
      var tags = Object.keys(tagSet).sort();
      var wrap = document.getElementById('tagFilters');
      if (!tags.length) { wrap.innerHTML = ''; return; }

      wrap.innerHTML = tags.map(function(t) {
        return '<button class="filter-btn" data-tag="' + t + '">' + t + ' <span style="opacity:0.6">(' + tagSet[t] + ')</span></button>';
      }).join('');

      wrap.querySelectorAll('.filter-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var tag = btn.dataset.tag;
          if (activeTag === tag) {
            activeTag = null;
            wrap.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
          } else {
            activeTag = tag;
            wrap.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.tag === tag); });
          }
          applyFilters();
        });
      });
    }

    function applyFilters() {
      var query = document.getElementById('searchInput').value.toLowerCase().trim();
      var filtered = allRecipes.filter(function(r) {
        var matchTag = !activeTag || (r.tags || []).indexOf(activeTag) !== -1;
        var matchSearch = !query ||
          r.name.toLowerCase().indexOf(query) !== -1 ||
          (r.notes || '').toLowerCase().indexOf(query) !== -1 ||
          (r.tags || []).some(function(t) { return t.toLowerCase().indexOf(query) !== -1; });
        return matchTag && matchSearch;
      });
      renderGrid(filtered);
    }

    document.getElementById('searchInput').addEventListener('input', applyFilters);

    fetch('recipes.json?_=' + Date.now())
      .then(function(r) { return r.json(); })
      .then(function(data) {
        allRecipes = (data.recipes || []).slice().reverse();
        buildTagFilters(allRecipes);
        renderGrid(allRecipes);
      })
      .catch(function() {
        document.getElementById('countLabel').textContent = 'Could not load recipes';
      });
  </script>

</body>
</html>
